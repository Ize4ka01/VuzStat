<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VuzStat — Калькулятор баллов ЕГЭ и проходные баллы 2026</title>
    
    <style>
        /* Переменные для светлой и темной темы */
        :root {
            --bg-color: #f8faff;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --main-color: #1e56a0;
            --border-color: #edf2f7;
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --main-color: #38bdf8;
            --border-color: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; transition: background 0.2s, color 0.2s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 60px; }
        
        header { background-color: var(--card-bg); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 24px; font-weight: bold; color: var(--main-color); text-decoration: none; }
        .theme-toggle { background: none; border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 14px; }

        /* Калькулятор */
        .calculator-section { max-width: 800px; margin: 40px auto 20px; background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid var(--border-color); text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .calculator-section h2 { margin-bottom: 15px; font-size: 20px; }
        .inputs-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: var(--text-muted); font-weight: bold; }
        .input-group input { width: 80px; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color); text-align: center; font-size: 16px; font-weight: bold; }
        .calc-btn { background-color: var(--main-color); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* Поиск */
        .search-section { max-width: 800px; margin: 0 auto 40px; padding: 0 20px; }
        .search-box input { width: 100%; padding: 18px 25px; border-radius: 50px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); font-size: 16px; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }

        /* Карточки */
        .popular-section { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .popular-section h2 { font-size: 22px; margin-bottom: 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        
        .university-card { background: var(--card-bg); padding: 25px; border-radius: 12px; border: 1px solid var(--border-color); text-decoration: none; color: inherit; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .university-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .vuz-icon { font-size: 32px; background: var(--bg-color); padding: 10px; border-radius: 10px; }
        .university-card h3 { color: var(--main-color); font-size: 18px; }
        .city-badge { display: inline-block; background: var(--bg-color); color: var(--text-muted); font-size: 12px; padding: 4px 8px; border-radius: 4px; margin-top: 5px; }
        .vuz-info-text { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 15px; }
        
        .card-scores { display: flex; gap: 10px; font-size: 13px; font-weight: bold; }
        .score-tag { padding: 5px 10px; border-radius: 6px; }
        .sc-budget { background: #e3f9e5; color: #1f7a26; }
        .sc-comm { background: #fff3cd; color: #856404; }

        footer { margin-top: 80px; border-top: 1px solid var(--border-color); background: var(--card-bg); padding: 30px 5%; text-align: center; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">🎓 VuzStat</a>
        <button class="theme-toggle" id="theme-btn">🌙 Темная тема</button>
    </header>

    <section class="calculator-section">
        <h2>Калькулятор шансов поступления</h2>
        <div class="inputs-grid">
            <div class="input-group">
                <label>Мат. (проф)</label>
                <input type="number" id="math-input" placeholder="0" min="0" max="100">
            </div>
            <div class="input-group">
                <label>Русский яз.</label>
                <input type="number" id="rus-input" placeholder="0" min="0" max="100">
            </div>
            <div class="input-group">
                <label>Инф / Общ</label>
                <input type="number" id="third-input" placeholder="0" min="0" max="100">
            </div>
        </div>
        <button class="calc-btn" id="calc-button">Подобрать вузы по баллам</button>
    </section>

    <section class="search-section">
        <div class="search-box">
            <input type="text" id="live-search" placeholder="Введите название вуза, город или направление (например: IT, Москва)...">
        </div>
    </section>

    <section class="popular-section">
        <h2>Доступные учебные заведения</h2>
        <div class="cards-grid" id="vuz-container">
            <!-- Карточки загрузит скрипт ниже -->
        </div>
    </section>

    <footer>
        <p>© 2026 VuzStat. Все права защищены. Помогаем абитуриентам поступать на бюджет.</p>
    </footer>

    <script>
        // База данных прямо в коде
        const universities = [
            {
                name: "МГУ им. М.В. Ломоносова",
                city: "москва",
                tags: ["it", "математика", "юрист", "медицина"],
                link: "mgu.html",
                icon: "🏛️",
                desc: "Главный вуз страны. Высокие проходные баллы, сильные традиции и собственный внутренний экзамен (ДВИ).",
                minBudget: 350,
                minComm: 240
            },
            {
                name: "СПбГУ",
                city: "санкт-петербург питер спб",
                tags: ["it", "международные отношения", "программирование"],
                link: "spbgu.html",
                icon: "⚓",
                desc: "Один из старейших вузов России. Программы международного уровня и сильный преподавательский состав.",
                minBudget: 298,
                minComm: 210
            }
        ];

        // Функция вывода карточек на экран
        function displayVuz(list) {
            const container = document.getElementById('vuz-container');
            if (!container) return;
            
            container.innerHTML = "";
            
            if (list.length === 0) {
                container.innerHTML = "<p style='color: var(--text-muted); grid-column: 1/-1; text-align: center; padding: 20px;'>Ничего не найдено по вашему запросу...</p>";
                return;
            }

            list.forEach(vuz => {
                container.innerHTML += `
                    <a href="${vuz.link}" class="university-card">
                        <div class="card-header">
                            <div class="vuz-icon">${vuz.icon}</div>
                            <div>
                                <h3>${vuz.name}</h3>
                                <span class="city-badge">${vuz.city.split(' ')[0].toUpperCase()}</span>
                            </div>
                        </div>
                        <p class="vuz-info-text">${vuz.desc}</p>
                        <div class="card-scores">
                            <span class="score-tag sc-budget">Бюджет от: ${vuz.minBudget}</span>
                            <span class="score-tag sc-comm">Платное от: ${vuz.minComm}</span>
                        </div>
                    </a>
                `;
            });
        }

        // Логика поиска
        const searchInput = document.getElementById('live-search');
        if (searchInput) {
            searchInput.addEventListener('input', function(e) {
                let text = e.target.value.toLowerCase().trim();
                let filtered = universities.filter(vuz => {
                    return vuz.name.toLowerCase().includes(text) || 
                           vuz.city.toLowerCase().includes(text) || 
                           vuz.tags.some(t => t.includes(text));
                });
                displayVuz(filtered);
            });
        }

        // Логика калькулятора
        const calcBtn = document.getElementById('calc-button');
        if (calcBtn) {
            calcBtn.addEventListener('click', function() {
                let m = parseInt(document.getElementById('math-input').value) || 0;
                let r = parseInt(document.getElementById('rus-input').value) || 0;
                let t = parseInt(document.getElementById('third-input').value) || 0;
                let total = m + r + t;

                if (total === 0) {
                    displayVuz(universities);
                    return;
                }

                let filtered = universities.filter(vuz => total >= vuz.minComm);
                displayVuz(filtered);
                alert("Сумма баллов: " + total + ". Показываем вузы, куда вы проходите по баллам коммерции прошлых лет!");
            });
        }

        // Логика переключения тем
        const themeBtn = document.getElementById('theme-btn');
        if (themeBtn) {
            themeBtn.addEventListener('click', function() {
                if (document.body.getAttribute('data-theme') === 'dark') {
                    document.body.removeAttribute('data-theme');
                    themeBtn.innerText = "🌙 Темная тема";
                } else {
                    document.body.setAttribute('data-theme', 'dark');
                    themeBtn.innerText = "☀️ Светлая тема";
                }
            });
        }

        // Показываем карточки при первой загрузке
        displayVuz(universities);
    </script>
</body>
</html>
